<title>Contagem de Estoque</title>
<style>

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--fundo);
    color:#1a2230;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  header{background:var(--verde);color:#fff;padding:12px 14px 10px;flex:0 0 auto}
  .titulo{font-size:19px;font-weight:800;letter-spacing:.3px}
  .sub{font-size:12.5px;color:#bfe3d7;margin-top:2px}
  .busca-wrap{position:relative;margin-top:10px}
  .nav-row{display:flex;gap:7px;align-items:center;margin-top:9px}
  .filtro-toggle{flex:0 0 auto;border:none;background:rgba(255,255,255,.16);color:#fff;
    font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:20px;white-space:nowrap}
  .filtro-toggle.on{background:#fff;color:var(--verde)}
  .marcas-bar{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    flex:1 1 auto;min-width:0;padding-bottom:2px;scrollbar-width:none}
  .marcas-bar::-webkit-scrollbar{display:none}
  .marca-chip{flex:0 0 auto;border:none;background:rgba(255,255,255,.16);color:#fff;
    font-size:13px;font-weight:700;padding:8px 13px;border-radius:20px;white-space:nowrap}
  .marca-chip:active{background:rgba(255,255,255,.30)}
  .marca-chip.ativo{background:#fff;color:var(--verde)}
  #busca{width:100%;border:none;border-radius:11px;padding:14px 44px 14px 16px;font-size:17px;background:#fff;color:#1a2230;outline:none}
  #busca::placeholder{color:#8a93a3}
  .limpar-busca{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:#dfe4ec;color:#5b6677;width:32px;height:32px;border-radius:8px;font-size:18px;display:none;align-items:center;justify-content:center}
  .limpar-busca.on{display:flex}
  main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 12px;position:relative}
  .marca-hdr{position:sticky;top:0;background:var(--fundo);font-size:13px;font-weight:800;color:var(--verde);
    text-transform:uppercase;letter-spacing:.7px;padding:12px 6px 6px;z-index:1}
  /* durante a medição do alvo de rolagem, desligamos o sticky para ler a
     posição REAL (de layout) do cabeçalho, e não a posição "grudada" no topo */
  #lista.medindo .marca-hdr{position:static}
  .marca-hdr .cont{color:#9aa3b0;font-weight:700;font-size:12px}
  .item{display:flex;align-items:center;gap:10px;background:var(--branco);border:1px solid var(--linha);border-radius:13px;padding:9px 12px 9px 14px;margin-bottom:8px}
  .item.tem{border-color:#a9d8c8;background:#fbfefd}
  .nome{flex:1 1 auto;font-size:15.5px;font-weight:600;line-height:1.2;min-width:0}
  .qtd-in{flex:0 0 auto;width:84px;height:50px;border:2px solid var(--linha);border-radius:11px;font-size:22px;font-weight:800;text-align:center;color:var(--verde);outline:none;background:#fff}
  .qtd-in:focus{border-color:var(--verde)}
  .qtd-in.vazio{color:#b9c1cd;font-weight:600}
  .vazio-busca{text-align:center;color:#8a93a3;font-size:15px;padding:40px 20px}
  footer{flex:0 0 auto;background:var(--branco);border-top:1px solid var(--linha);padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
  .total-linha{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
  .total-rot{font-size:13px;color:var(--cinza);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .total-num{font-size:22px;font-weight:800;color:var(--verde);font-variant-numeric:tabular-nums}
  .acoes{display:flex;gap:8px}
  .acao{flex:1;border:none;border-radius:11px;padding:14px 8px;font-size:15px;font-weight:800;color:#fff}
  .enviar{background:var(--verde)}.enviar:active{background:var(--verde-escuro)}
  .copiar{background:var(--azul)}.copiar:active{background:#16294a}
  .menu-btn{flex:0 0 auto;width:52px;background:#eef1f5;color:#5b6677;font-size:22px}.menu-btn:active{background:#dfe4ec}
  .sheet-bg{position:fixed;inset:0;background:rgba(15,25,40,.55);display:none;z-index:10}.sheet-bg.on{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;z-index:11;border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .22s ease;max-height:80dvh;overflow:auto}
  .sheet.on{transform:translateY(0)}
  .sheet h2{font-size:17px;margin-bottom:4px}.sheet p{font-size:13.5px;color:var(--cinza);margin-bottom:12px}
  .sheet .acao{width:100%;margin-bottom:9px}
  .reset{background:#fbeaec;color:var(--vermelho)}.reset:active{background:#f3d6da}
  .fechar-sheet{background:#eef1f5;color:#5b6677}
  .full{position:fixed;inset:0;z-index:30;background:var(--fundo);display:none;flex-direction:column}.full.on{display:flex}
  .full-head{background:var(--verde);color:#fff;display:flex;align-items:center;gap:6px;padding:14px;flex:0 0 auto}
  .full-voltar{border:none;background:transparent;color:#fff;font-size:30px;line-height:1;width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin-left:-6px}
  .full-titulo{font-size:19px;font-weight:800}
  .full-body{flex:1 1 auto;overflow-y:auto;padding:10px 12px 14px}
  .resumo-cont{font-size:13px;color:var(--cinza);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:2px 2px 10px}
  .resumo-marca{font-size:12.5px;font-weight:800;color:var(--verde);text-transform:uppercase;letter-spacing:.6px;margin:14px 2px 8px}
  .resumo-vazio{text-align:center;color:#8a93a3;font-size:16px;padding:50px 24px}
  .resumo-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--linha);border-radius:12px;padding:13px 15px;margin-bottom:8px}
  .resumo-item .rnome{flex:1 1 auto;font-size:16px;font-weight:600;line-height:1.25}
  .resumo-item .rsku{font-size:12px;color:var(--cinza);font-weight:600;margin-top:2px}
  .resumo-item .rqtd{flex:0 0 auto;font-size:24px;font-weight:800;color:var(--verde);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
  .full-foot{flex:0 0 auto;background:#fff;border-top:1px solid var(--linha);padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
  .full-foot .acao{width:100%;margin-bottom:9px;padding:16px 8px;font-size:16px}.full-foot .acao:last-child{margin-bottom:0}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--verde-escuro);color:#fff;padding:11px 18px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:40;white-space:nowrap}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .update-bar{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));background:var(--azul);color:#fff;border-radius:13px;z-index:50;display:none;align-items:center;gap:10px;padding:12px 12px 12px 16px;box-shadow:0 6px 24px rgba(15,25,40,.35)}
  .update-bar.on{display:flex}
  .update-bar .txt{flex:1 1 auto;font-size:14.5px;font-weight:600}
  .update-bar button{flex:0 0 auto;border:none;border-radius:9px;padding:11px 16px;font-size:14px;font-weight:800;background:#2e9e5b;color:#fff}
</style>
</head>

<noscript><div style="padding:24px;font-family:sans-serif;background:#fbeaec;color:#b00020;font-size:16px;line-height:1.5"><b>Este app precisa abrir no navegador.</b><br>Abra pelo <b>Chrome</b> (ou pelo ícone instalado na tela inicial).</div></noscript>
<header>
  <div class="titulo">Contagem de Estoque</div>
  <div class="sub">Digite a quantidade atual de cada produto</div>
  <div class="busca-wrap">
    <input id="busca" type="text" inputmode="search" autocomplete="off" placeholder="Buscar produto…">
    <button class="limpar-busca" id="limparBusca" aria-label="Limpar busca">×</button>
  </div>
  <div class="nav-row">
    <button class="filtro-toggle" id="toggleFaltam" aria-pressed="false">Faltam</button>
    <div class="marcas-bar" id="marcasBar"></div>
  </div>
</header>
<main id="lista"></main>
<footer>
  <div class="total-linha"><span class="total-rot">Produtos preenchidos</span><span class="total-num" id="totalNum">0</span></div>
  <div class="acoes">
    <button class="acao enviar" id="btnEnviar">Enviar</button>
    <button class="acao copiar" id="btnCopiar">Copiar SKUs</button>
    <button class="acao menu-btn" id="btnMenu" aria-label="Mais opções">⋯</button>
  </div>
</footer>
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"><div id="sheetMenu">
  <h2>Opções</h2><p>Gere a planilha de importação (Excel) para subir no UpSeller. Exporte um backup antes de limpar.</p>
  <button class="acao enviar" id="btnPlanilha">Gerar planilha p/ importar (Excel)</button>
  <button class="acao copiar" id="btnExportar">Exportar contagem (backup)</button>
  <button class="acao fechar-sheet" id="btnImportar">Importar contagem (arquivo)</button>
  <button class="acao reset" id="btnLimparTudo">Limpar tudo (zerar campos)</button>
  <button class="acao fechar-sheet" id="btnFecharMenu">Voltar</button>
</div></div>
<input type="file" id="fileImport" accept="application/json,.json" style="display:none">
<div class="full" id="resumoFull">
  <div class="full-head"><button class="full-voltar" id="resumoFechar" aria-label="Voltar">‹</button><div class="full-titulo">Resumo do estoque</div></div>
  <div class="full-body" id="resumoBody"></div>
  <div class="full-foot"><button class="acao enviar" id="btnShareWpp">Enviar pelo WhatsApp</button><button class="acao copiar" id="btnCopiarResumo">Copiar lista (SKU)</button></div>
</div>
<div class="toast" id="toast"></div>
<div class="update-bar" id="updateBar"><div class="txt">Nova versão disponível</div><button id="btnAtualizar">Atualizar agora</button></div>
<script src="./planilha-modelo.js"></script>

// achata mantendo a marca de cada item
const PRODUTOS=[]; const GRUPOS=[];
CATALOGO.forEach(g=>{ const ini=PRODUTOS.length; g.itens.forEach(it=>PRODUTOS.push({sku:it.sku,nome:it.nome,marca:g.marca})); GRUPOS.push({marca:g.marca,ini,fim:PRODUTOS.length}); });
const CHAVE="estoque_valores_v1";
let valores=carregar();
function carregar(){try{const raw=localStorage.getItem(CHAVE);if(raw){const o=JSON.parse(raw);if(o&&typeof o==="object")return PRODUTOS.map(p=> (p.sku in o)?String(o[p.sku]):"");}}catch(e){}return PRODUTOS.map(()=> "");}
function salvar(){try{localStorage.setItem(CHAVE,JSON.stringify(mapaValores()));}catch(e){}}
function norm(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase();}
const NOMES_NORM=PRODUTOS.map(p=>norm(p.nome+" "+p.sku+" "+p.marca));
const lista=document.getElementById("lista");const refs=[];const hdrs=[];
function montar(){
  lista.innerHTML="";refs.length=0;hdrs.length=0;
  GRUPOS.forEach(g=>{
    const h=document.createElement("div");h.className="marca-hdr";
    h.innerHTML=g.marca+' <span class="cont"></span>';
    lista.append(h);hdrs.push({el:h,ini:g.ini,fim:g.fim,cont:h.querySelector(".cont")});
    for(let i=g.ini;i<g.fim;i++){
      const p=PRODUTOS[i];
      const item=document.createElement("div");item.className="item";
      const nm=document.createElement("div");nm.className="nome";nm.textContent=p.nome;
      const inp=document.createElement("input");inp.className="qtd-in";inp.type="text";inp.inputMode="numeric";inp.enterKeyHint="next";inp.maxLength=6;inp.placeholder="—";inp.value=valores[i];inp.setAttribute("aria-label","Quantidade de "+p.nome);
      inp.addEventListener("input",()=>{let v=inp.value.replace(/[^\d]/g,"");if(v.length>1)v=v.replace(/^0+(?=\d)/,"");inp.value=v;valores[i]=v;salvar();pintar(i);atualizarTotal();});
      inp.addEventListener("focus",()=>inp.select());
      inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();focarProximo(i);}});
      item.append(nm,inp);lista.append(item);refs.push({item,inp});pintar(i);
    }
  });
  atualizarTotal();
}
function pintar(i){const r=refs[i];if(!r)return;const tem=valores[i]!=="";r.item.classList.toggle("tem",tem);r.inp.classList.toggle("vazio",!tem);}
function atualizarConts(){hdrs.forEach(h=>{if(!h.cont)return;let n=0;for(let i=h.ini;i<h.fim;i++)if(valores[i]!=="")n++;h.cont.textContent=n+"/"+(h.fim-h.ini);});}
function atualizarTotal(){document.getElementById("totalNum").textContent=valores.filter(v=>v!=="").length;atualizarConts();}
// foca o próximo campo VISÍVEL (respeita busca/filtro); no último, fecha o teclado
function focarProximo(i){for(let j=i+1;j<refs.length;j++){if(refs[j].item.style.display!=="none"){refs[j].inp.focus();return;}}if(refs[i])refs[i].inp.blur();}
const busca=document.getElementById("busca"),limparBusca=document.getElementById("limparBusca");
busca.addEventListener("input",filtrar);
limparBusca.addEventListener("click",()=>{busca.value="";filtrar();busca.focus();});
let soFaltam=false;
function filtrar(){
  const termos=norm(busca.value.trim()).split(/\s+/).filter(Boolean);
  limparBusca.classList.toggle("on",busca.value.length>0);
  let vis=0;
  refs.forEach((r,i)=>{const ok=termos.every(t=>NOMES_NORM[i].includes(t))&&(!soFaltam||valores[i]==="");r.item.style.display=ok?"":"none";if(ok)vis++;});
  hdrs.forEach(h=>{let algum=false;for(let i=h.ini;i<h.fim;i++){if(refs[i].item.style.display!=="none"){algum=true;break;}}h.el.style.display=algum?"":"none";});
  let vz=document.getElementById("vazioBusca");
  if(vis===0){if(!vz){vz=document.createElement("div");vz.id="vazioBusca";vz.className="vazio-busca";lista.append(vz);}vz.textContent=(soFaltam&&!termos.length)?"Tudo contado! 🎉":"Nenhum produto encontrado.";}
  else if(vz){vz.remove();}
}
const toggleFaltam=document.getElementById("toggleFaltam");
toggleFaltam.addEventListener("click",()=>{
  soFaltam=!soFaltam;
  toggleFaltam.classList.toggle("on",soFaltam);
  toggleFaltam.setAttribute("aria-pressed",String(soFaltam));
  filtrar();
  // ao ligar, volta ao topo para começar a contar o que falta
  if(soFaltam) lista.scrollTop=0;
});
function preenchidos(){const out=[];PRODUTOS.forEach((p,i)=>{if(valores[i]!=="")out.push({sku:p.sku,nome:p.nome,marca:p.marca,qtd:valores[i]});});return out;}
function textoEnvio(){const itens=preenchidos();const data=new Date().toLocaleDateString("pt-BR");if(itens.length===0)return "Estoque ("+data+")\nNenhum produto preenchido.";let t="Estoque ("+data+")\n\n";itens.forEach(x=>{t+=x.sku+" - "+x.qtd+"\n";});t+="\n"+itens.length+" itens";return t;}
function listaSku(){return preenchidos().map(x=>x.sku+" - "+x.qtd).join("\n");}
const sheetBg=document.getElementById("sheetBg"),sheet=document.getElementById("sheet");
function abrirMenu(){sheetBg.classList.add("on");sheet.classList.add("on");}
function fecharSheet(){sheet.classList.remove("on");sheetBg.classList.remove("on");}
sheetBg.addEventListener("click",fecharSheet);
document.getElementById("btnFecharMenu").addEventListener("click",fecharSheet);
document.getElementById("btnMenu").addEventListener("click",abrirMenu);
const resumoFull=document.getElementById("resumoFull");
function abrirResumo(){
  const itens=preenchidos();const body=document.getElementById("resumoBody");body.innerHTML="";
  if(itens.length===0){const v=document.createElement("div");v.className="resumo-vazio";v.textContent="Nenhum produto preenchido ainda. Digite as quantidades na lista.";body.append(v);}
  else{
    const cab=document.createElement("div");cab.className="resumo-cont";cab.textContent=itens.length+(itens.length===1?" produto":" produtos");body.append(cab);
    let marcaAtual=null;
    itens.forEach(x=>{
      if(x.marca!==marcaAtual){marcaAtual=x.marca;const mh=document.createElement("div");mh.className="resumo-marca";mh.textContent=x.marca;body.append(mh);}
      const row=document.createElement("div");row.className="resumo-item";
      const wrap=document.createElement("div");wrap.className="rnome";wrap.style.flex="1 1 auto";wrap.textContent=x.nome;
      const sku=document.createElement("div");sku.className="rsku";sku.textContent="SKU "+x.sku;wrap.append(sku);
      const q=document.createElement("div");q.className="rqtd";q.textContent=x.qtd;
      row.append(wrap,q);body.append(row);
    });
  }
  resumoFull.classList.add("on");
}
function fecharResumo(){resumoFull.classList.remove("on");}
document.getElementById("btnEnviar").addEventListener("click",abrirResumo);
document.getElementById("resumoFechar").addEventListener("click",fecharResumo);
document.getElementById("btnCopiar").addEventListener("click",()=>copiar(listaSku(),"Lista de SKUs copiada"));
document.getElementById("btnShareWpp").addEventListener("click",async()=>{const txt=textoEnvio();if(navigator.share){try{await navigator.share({text:txt});}catch(e){}}else{window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");}});
document.getElementById("btnCopiarResumo").addEventListener("click",()=>copiar(textoEnvio(),"Lista copiada"));
document.getElementById("btnLimparTudo").addEventListener("click",()=>{if(confirm("Apagar todas as quantidades e começar uma contagem nova?")){valores=PRODUTOS.map(()=> "");salvar();refs.forEach((r,i)=>{r.inp.value="";pintar(i);});atualizarTotal();fecharSheet();fecharResumo();toast("Pronto — campos zerados");}});
// Planilha de importação (.xlsx) p/ UpSeller: Coluna A = SKU, Coluna B = Quantidade.
// Reproduz FIELMENTE o template oficial (window.MODELO_XLSX, em planilha-modelo.js):
// mantém estilos/fontes/sharedStrings byte a byte e só reescreve a aba e as strings.
function _crc32(bytes){let c,crc=0xFFFFFFFF;if(!_crc32.t){const t=new Uint32Array(256);for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}_crc32.t=t;}const t=_crc32.t;for(let i=0;i<bytes.length;i++)crc=t[(crc^bytes[i])&0xff]^(crc>>>8);return (crc^0xFFFFFFFF)>>>0;}
function _u8(str){return new TextEncoder().encode(str);}
function _b64u8(b64){const bin=atob(b64),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
function _escXml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function gerarPlanilhaBlob(itens){
  const M=window.MODELO_XLSX,dec=new TextDecoder(),n=itens.length;
  // sharedStrings: 4 cabeçalhos originais + 1 entrada por SKU
  let sst=dec.decode(_b64u8(M["xl/sharedStrings.xml"]));
  const extra=itens.map(x=>'<si><t xml:space="preserve">'+_escXml(x.sku)+'</t></si>').join("");
  sst=sst.replace('count="4" uniqueCount="4"','count="'+(4+n)+'" uniqueCount="'+(4+n)+'"').replace("</sst>",extra+"</sst>");
  // worksheet: dimensão A1:D(1+n) + linhas de dados (A=SKU via sharedString, B=quantidade numérica)
  let sheet=dec.decode(_b64u8(M["xl/worksheets/sheet1.xml"]));
  sheet=sheet.replace('<dimension ref="A1:D1"/>','<dimension ref="A1:D'+(1+n)+'"/>');
  let rows="";
  itens.forEach((x,k)=>{const r=k+2,idx=4+k;rows+='<row r="'+r+'" spans="1:4"><c r="A'+r+'" t="s"><v>'+idx+'</v></c><c r="B'+r+'"><v>'+parseInt(x.qtd,10)+'</v></c></row>';});
  sheet=sheet.replace("</sheetData>",rows+"</sheetData>");
  const partes={};Object.keys(M).forEach(k=>partes[k]=_b64u8(M[k]));
  partes["xl/sharedStrings.xml"]=_u8(sst);partes["xl/worksheets/sheet1.xml"]=_u8(sheet);
  const order=["[Content_Types].xml","_rels/.rels","docProps/app.xml","docProps/core.xml","docProps/custom.xml","xl/workbook.xml","xl/_rels/workbook.xml.rels","xl/worksheets/sheet1.xml","xl/sharedStrings.xml","xl/styles.xml","xl/theme/theme1.xml"];
  const le16=v=>[v&0xff,(v>>8)&0xff],le32=v=>[v&0xff,(v>>8)&0xff,(v>>16)&0xff,(v>>>24)&0xff];
  const chunks=[],central=[];let offset=0;
  order.forEach(name=>{
    const data=partes[name],nb=_u8(name),crc=_crc32(data);
    const lh=[].concat(le32(0x04034b50),le16(20),le16(0),le16(0),le16(0),le16(0),le32(crc),le32(data.length),le32(data.length),le16(nb.length),le16(0));
    chunks.push(new Uint8Array(lh),nb,data);
    const cd=[].concat(le32(0x02014b50),le16(20),le16(20),le16(0),le16(0),le16(0),le16(0),le32(crc),le32(data.length),le32(data.length),le16(nb.length),le16(0),le16(0),le16(0),le16(0),le32(0),le32(offset));
    central.push(new Uint8Array(cd),nb);
    offset+=lh.length+nb.length+data.length;
  });
  let cdLen=0;central.forEach(c=>cdLen+=c.length);
  const eocd=new Uint8Array([].concat(le32(0x06054b50),le16(0),le16(0),le16(order.length),le16(order.length),le32(cdLen),le32(offset),le16(0)));
  return new Blob(chunks.concat(central,[eocd]),{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}
document.getElementById("btnPlanilha").addEventListener("click",()=>{
  const itens=preenchidos();
  if(itens.length===0){toast("Preencha alguma quantidade primeiro");return;}
  const blob=gerarPlanilhaBlob(itens);
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="importacao-estoque-"+new Date().toISOString().slice(0,10)+".xlsx";
  document.body.append(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  fecharSheet();toast(itens.length+" itens na planilha");
});
// Backup: exporta a contagem como arquivo .json (mapa SKU -> quantidade)
function mapaValores(){const o={};PRODUTOS.forEach((p,i)=>{if(valores[i]!=="")o[p.sku]=valores[i];});return o;}
document.getElementById("btnExportar").addEventListener("click",()=>{
  const payload={app:"contagem-estoque",versao:1,data:new Date().toISOString(),valores:mapaValores()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="contagem-estoque-"+new Date().toISOString().slice(0,10)+".json";
  document.body.append(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("Backup gerado");
});
const fileImport=document.getElementById("fileImport");
document.getElementById("btnImportar").addEventListener("click",()=>fileImport.click());
fileImport.addEventListener("change",()=>{
  const f=fileImport.files&&fileImport.files[0];fileImport.value="";if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const o=JSON.parse(reader.result);
      const mapa=(o&&o.valores&&typeof o.valores==="object")?o.valores:(o&&typeof o==="object"?o:null);
      if(!mapa)throw 0;
      if(!confirm("Substituir a contagem atual pelos dados do arquivo?"))return;
      valores=PRODUTOS.map(p=>(p.sku in mapa)?String(mapa[p.sku]).replace(/[^\d]/g,"").slice(0,6):"");
      salvar();refs.forEach((r,i)=>{r.inp.value=valores[i];pintar(i);});
      atualizarTotal();fecharSheet();toast("Contagem importada");
    }catch(e){toast("Arquivo inválido");}
  };
  reader.readAsText(f);
});
function copiar(texto,msg){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(texto).then(()=>toast(msg)).catch(()=>fallback(texto,msg));}else fallback(texto,msg);}
function fallback(texto,msg){const ta=document.createElement("textarea");ta.value=texto;ta.style.position="fixed";ta.style.opacity="0";document.body.append(ta);ta.select();try{document.execCommand("copy");toast(msg);}catch(e){toast("Não consegui copiar");}ta.remove();}
let tt=null;function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),2200);}
montar();
// barra de marcas: rola até o grupo
(function(){
  const bar=document.getElementById("marcasBar");
  const main=document.getElementById("lista");
  // Calcula o scrollTop necessário para levar o cabeçalho do grupo ao topo.
  // As divisórias são position:sticky (top:0) e, por serem filhas diretas de
  // #lista, TODAS grudam no topo ao longo de toda a rolagem. Por isso medir
  // com getBoundingClientRect()/scrollIntoView() devolve a posição "grudada"
  // (≈ topo), zerando o deslocamento ao SUBIR e prendendo a tela num scroll
  // mínimo. Medimos com o sticky desligado (classe .medindo, síncrono e sem
  // repaint) para ler a posição verdadeira — confiável subindo e descendo.
  const chips=[];
  const suave=("scrollBehavior" in document.documentElement.style)
    && !matchMedia("(prefers-reduced-motion: reduce)").matches;
  function alvoDoGrupo(gi){
    const h=hdrs[gi] && hdrs[gi].el;
    if(!h) return null;
    lista.classList.add("medindo");
    const topMain=main.getBoundingClientRect().top;
    const topHdr=h.getBoundingClientRect().top;
    lista.classList.remove("medindo");
    return Math.max(0, Math.round(main.scrollTop + topHdr - topMain) - 2);
  }
  GRUPOS.forEach((g,gi)=>{
    const b=document.createElement("button");
    b.className="marca-chip"; b.textContent=g.marca;
    b.addEventListener("click",()=>{
      if(busca.value){ busca.value=""; filtrar(); }   // garante o grupo visível
      const alvo=alvoDoGrupo(gi);
      if(alvo==null) return;
      if(suave) main.scrollTo({top:alvo, behavior:"smooth"});
      else main.scrollTop=alvo;   // fallback confiável (iOS antigo / reduce-motion)
    });
    chips.push(b); bar.append(b);
  });
  // destaca o chip do grupo que está no topo da lista enquanto rola.
  // offsetTop é a posição de layout (imune ao sticky), então é seguro aqui.
  let ativo=-1;
  function marcarAtivo(){
    const pos=main.scrollTop+8;
    let gi=0;
    for(let i=0;i<hdrs.length;i++){ if(hdrs[i].el.offsetTop<=pos) gi=i; else break; }
    if(gi===ativo) return;
    if(chips[ativo]) chips[ativo].classList.remove("ativo");
    if(chips[gi]) chips[gi].classList.add("ativo");
    ativo=gi;
    // mantém o chip ativo visível na barra horizontal (sem mexer na vertical)
    const b=chips[gi];
    if(b){ const bl=b.offsetLeft, br=bl+b.offsetWidth;
      if(bl<bar.scrollLeft) bar.scrollLeft=bl-8;
      else if(br>bar.scrollLeft+bar.clientWidth) bar.scrollLeft=br-bar.clientWidth+8; }
  }
  let ag=false;
  main.addEventListener("scroll",()=>{ if(ag) return; ag=true;
    requestAnimationFrame(()=>{ ag=false; marcarAtivo(); }); },{passive:true});
  marcarAtivo();
})();
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  let recarregando=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{if(recarregando)return;recarregando=true;window.location.reload();});
  function barraUp(reg){const bar=document.getElementById("updateBar");bar.classList.add("on");document.getElementById("btnAtualizar").onclick=()=>{bar.classList.remove("on");if(reg.waiting)reg.waiting.postMessage("SKIP_WAITING");};}
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").then(reg=>{
    if(reg.waiting&&navigator.serviceWorker.controller)barraUp(reg);
    reg.addEventListener("updatefound",()=>{const n=reg.installing;if(!n)return;n.addEventListener("statechange",()=>{if(n.state==="installed"&&navigator.serviceWorker.controller)barraUp(reg);});});
    reg.update();document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")reg.update();});
  }).catch(()=>{});});
}
